<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#1A1D16"/>
  <g transform="translate(256,256)">
    <!-- Outer triangle -->
    <polygon points="0,-180 156,90 -156,90" fill="none" stroke="#8BA069" stroke-width="12" stroke-linejoin="round"/>
    <!-- Inner triangle (inverted) -->
    <polygon points="0,90 -78,-45 78,-45" fill="none" stroke="#8BA069" stroke-width="8" stroke-linejoin="round"/>
    <!-- Eye -->
    <circle cx="0" cy="5" r="22" fill="#8BA069"/>
    <circle cx="0" cy="5" r="10" fill="#1A1D16"/>
    <!-- DG text -->
    <text x="0" y="165" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="72" fill="#5A6A40" letter-spacing="12">DG</text>
  </g>
</svg>
