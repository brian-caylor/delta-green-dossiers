[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — let React handle client routing/screen state.
# Supabase auth callback URLs are configured in the Supabase dashboard
# and served by supabase.co, so they do not need a redirect rule here.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache immutable build assets emitted by Vite.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
